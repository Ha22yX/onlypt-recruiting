<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>{% block title %}onlyPT Admin{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,650&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}?v=20260704-lead-tracking1">
    <script src="https://unpkg.com/lucide@latest" defer></script>
    {% block extra_head %}{% endblock %}
  </head>
  <body class="admin-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="admin-flash-stack" role="status" aria-live="polite">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <main id="main">
      {% block content %}{% endblock %}
    </main>

    {% block extra_scripts %}{% endblock %}
  </body>
</html>
